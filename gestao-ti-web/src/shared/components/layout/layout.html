<div class="layout">

  <button class="menu-toggle-floating" (click)="toggleMenu()" [class.hidden]="menuOpen">
    ☰
  </button>

  <div class="overlay" [class.active]="menuOpen" (click)="closeMenu()"></div>

  <aside class="sidebar" [class.open]="menuOpen">

    <div class="sidebar-header">
      <h2>Gestão TI</h2>
      <button class="btn-close" (click)="closeMenu()">✕</button>
    </div>

    <nav class="menu">
      <a routerLink="/equipments" routerLinkActive="active" class="menu-item" (click)="closeMenu()">
        <span class="icon">💻</span> Equipamentos
      </a>

      @if (isAdmin) {
        <a routerLink="/licenses" routerLinkActive="active" class="menu-item" (click)="closeMenu()">
          <span class="icon">🔑</span> Licenças
        </a>
        <a routerLink="/users" routerLinkActive="active" class="menu-item" (click)="closeMenu()">
          <span class="icon">👥</span> Usuários
        </a>
      }
    </nav>

    <button class="btn-logout" (click)="logout()">
      <span class="icon">🚪</span> Sair
    </button>
  </aside>

  <main class="content">
    <router-outlet />
  </main>

</div>
