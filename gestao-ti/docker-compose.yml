services:
  postgres:
    image: postgres:16
    container_name: gestao_ti_db
    environment:
      POSTGRES_DB: gestao_ti
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: